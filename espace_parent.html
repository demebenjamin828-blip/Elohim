<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Parent | ELOHIM APPUI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --gold: #facc15; --emerald: #064e3b; --dark: #020617; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a 40%, #064e3b);
            color: white;
            min-height: 100vh;
        }

        /* Navbar Style */
        .custom-nav {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Card Style */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            transition: 0.3s;
        }

        .profile-avatar {
            width: 70px;
            height: 70px;
            background: var(--gold);
            color: var(--dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0 auto 15px;
        }

        .child-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 20px;
            transition: 0.4s;
            position: relative;
        }

        .child-card:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.06);
        }

        .badge-classe {
            background: var(--gold);
            color: var(--dark);
            font-weight: 800;
            font-size: 0.7rem;
            padding: 5px 12px;
            border-radius: 10px;
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .btn-notes {
            background: rgba(250, 204, 21, 0.1);
            color: var(--gold);
            border: 1px solid var(--gold);
            border-radius: 12px;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-notes:hover {
            background: var(--gold);
            color: var(--dark);
        }

        /* Message quand c'est vide */
        .empty-state {
            text-align: center;
            padding: 50px;
            background: rgba(255,255,255,0.02);
            border-radius: 30px;
            border: 2px dashed rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <nav class="navbar custom-nav mb-5">
        <div class="container">
            <a class="navbar-brand text-white fw-800" href="#">ELOHIM <span style="color:var(--gold)">APPUI</span></a>
            <button onclick="logout()" class="btn btn-outline-danger btn-sm rounded-pill fw-bold">
                <i class="fa-solid fa-power-off me-2"></i>DÉCONNEXION
            </button>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="glass-card text-center">
                    <div class="profile-avatar" id="parentInitial">?</div>
                    <h4 id="parentNom" class="fw-bold mb-4">...</h4>
                    <div class="text-start">
                        <small class="text-secondary d-block">EMAIL</small>
                        <p id="parentEmail" class="mb-3 small">...</p>
                        <small class="text-secondary d-block">TÉLÉPHONE</small>
                        <p id="parentTel" class="small">...</p>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold"><i class="fa-solid fa-children me-2 text-gold"></i> Mes Enfants</h3>
                </div>

                <div id="loader" class="text-center py-5">
                    <div class="spinner-border text-warning" role="status"></div>
                </div>

                <div class="row g-3" id="childrenGrid">
                    </div>
            </div>
        </div>
    </div>

<script>
    const _supabase = supabase.createClient('https://inrcrtyvbgjrrccpzxlk.supabase.co','sb_publishable_tEVOnHljw_fz5UC_cEG9pA_9xglC1VK');

    const parentId = localStorage.getItem('parent_id');
    if (!parentId) { window.location.href = "login_parent.html"; }

    async function chargerEspaceParent() {
        try {
            // 1. Infos Parent
            const { data: parent, error: pErr } = await _supabase
                .from('parents').select('*').eq('id_parent', parentId).single();

            if (parent) {
                document.getElementById('parentNom').innerText = parent.nom_complet;
                document.getElementById('parentEmail').innerText = parent.email;
                document.getElementById('parentTel').innerText = parent.telephone || 'Non renseigné';
                document.getElementById('parentInitial').innerText = parent.nom_complet.charAt(0).toUpperCase();
            }

            // 2. Récupérer les enfants
            const { data: enfants, error: eErr } = await _supabase
                .from('eleves').select('*').eq('id_parent', parentId);

            document.getElementById('loader').classList.add('d-none');
            const grid = document.getElementById('childrenGrid');

            // --- GESTION DU VIDE ---
            if (!enfants || enfants.length === 0) {
                grid.innerHTML = `
                    <div class="col-12">
                        <div class="empty-state">
                            <i class="fa-solid fa-face-search mb-3" style="font-size: 3rem; opacity: 0.2;"></i>
                            <h4 class="fw-bold">Aucune donnée trouvée</h4>
                            <p class="text-secondary">Votre compte n'est actuellement rattaché à aucun élève.</p>
                            <p class="small text-warning">Veuillez contacter l'administration de l'école.</p>
                        </div>
                    </div>`;
                return;
            }

            // 3. Affichage des enfants
            enfants.forEach(enfant => {
                grid.innerHTML += `
                    <div class="col-md-6">
                        <div class="child-card">
                            <span class="badge-classe">${enfant.classe}</span>
                            <div class="d-flex align-items-center mb-3">
                                <div class="bg-warning rounded-circle d-flex align-items-center justify-content-center me-3" style="width:45px; height:45px; color:black">
                                    <i class="fa-solid fa-user"></i>
                                </div>
                                <div>
                                    <h5 class="mb-0 fw-bold">${enfant.prenom_enfant}</h5>
                                    <small class="text-secondary">${enfant.nom_enfant}</small>
                                </div>
                            </div>
                            <a href="bulletin.html?id=${enfant.id_eleve}" class="btn btn-notes w-100 py-2 mt-2">
                                <i class="fa-solid fa-chart-line me-2"></i>VOIR LES NOTES
                            </a>
                        </div>
                    </div>`;
            });

        } catch (err) {
            console.error("Erreur:", err);
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }

    chargerEspaceParent();
</script>
</body>
</html>
