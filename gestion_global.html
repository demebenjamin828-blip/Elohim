<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Admin | Appui2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family:'Segoe UI',sans-serif; background:#f4f6f9; margin:0; }
        .glass-nav { display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background:#007bff; color:#fff; flex-wrap:wrap; }
        .glass-nav .logo { font-weight:bold; font-size:1.3em; }
        .glass-nav .links a { color:#fff; text-decoration:none; margin-left:15px; font-size: 0.9em; }
        .badge { background:#ffc107; color:#000; padding:3px 8px; border-radius:5px; font-weight:bold; font-size: 0.8em; }
        
        .main-container { max-width:1000px; margin:50px auto; padding:0 20px; }
        .glass-card { background:#fff; padding:25px; border-radius:15px; box-shadow:0 8px 25px rgba(0,0,0,0.1); margin-bottom:30px; }
        
        .admin-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; }
        .stats-pill { background:#e0f0ff; color:#007bff; padding:8px 15px; border-radius:20px; font-weight:bold; margin-top:10px; }
        
        .search-bar-mock { margin:20px 0; position:relative; }
        .search-bar-mock i { position:absolute; top:50%; left:10px; transform:translateY(-50%); color:#aaa; }
        .search-bar-mock input { width:100%; padding:10px 10px 10px 35px; border-radius:10px; border:1px solid #ddd; outline: none; }
        .search-bar-mock input:focus { border-color: #007bff; }

        .parent-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:20px; }
        .parent-item { background:#fefefe; padding:15px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.05); display:flex; flex-direction:column; justify-content:space-between; border: 1px solid #eee; transition: 0.3s; }
        .parent-item:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        
        .parent-avatar { width:50px; height:50px; border-radius:50%; background:#007bff; color:#fff; display:flex; justify-content:center; align-items:center; font-weight:bold; font-size:1.2em; margin-bottom:10px; }
        .parent-info h3 { margin:0; font-size:1em; color: #333; }
        .parent-info p { margin: 5px 0; font-size: 0.85em; color: #666; }
        
        .parent-actions a { text-decoration:none; color:#fff; background:#007bff; padding:8px 12px; border-radius:10px; font-size:0.85em; display:inline-flex; align-items:center; gap:5px; margin-top:10px; transition: 0.2s; }
        .parent-actions a:hover { background: #0056b3; }
        
        .empty-state, #loader { text-align:center; padding:50px 0; color:#555; grid-column:1/-1; }
        .empty-state i { font-size:3em; color:#007bff; margin-bottom:15px; display:block; }
        .logout-btn { cursor: pointer; }
    </style>
</head>
<body>

<nav class="glass-nav">
    <div class="logo">Appui<span>Admin</span></div>
    <div class="nav-status"><span class="badge">Mode Administration</span></div>
    <div class="links">
        <a href="ajouter_note.html"><i class="fa-solid fa-pen"></i> Saisir Note</a>
        <a href="ajouter_cours.html"><i class="fa-solid fa-book"></i> Nouveau Cours</a>
        <span onclick="logout()" class="links logout-btn"><a href="#"><i class="fa-solid fa-power-off"></i></a></span>
    </div>
</nav>

<div class="main-container">
    <div class="glass-card">
        <div class="admin-header">
            <h2><i class="fa-solid fa-users-gear"></i> Gestion des Familles</h2>
            <div class="stats-pill"><span id="countParents">0</span> parents inscrits</div>
        </div>

        <div class="search-bar-mock">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Rechercher une famille (nom ou email)..." id="parentSearch">
        </div>

        <div id="loader"><i class="fas fa-spinner fa-spin fa-2x"></i><p>Chargement des familles...</p></div>

        <div class="parent-list" id="parentList">
            </div>
    </div>
</div>

<script>
    // 1. Initialisation Supabase
    const _supabase = supabase.createClient('https://inrcrtyvbgjrrccpzxlk.supabase.co','sb_publishable_tEVOnHljw_fz5UC_cEG9pA_9xglC1VK');

    // 2. Vérification Session Staff
    if (!localStorage.getItem('staff_id')) {
        window.location.href = "login_staff.html";
    }

    // 3. Charger les parents depuis Supabase
    async function chargerParents() {
        try {
            const { data: parents, error } = await _supabase
                .from('parents')
                .select('id_parent, nom_complet, email')
                .order('nom_complet', { ascending: true });

            if (error) throw error;

            const listContainer = document.getElementById('parentList');
            const loader = document.getElementById('loader');
            const countSpan = document.getElementById('countParents');

            loader.style.display = 'none';
            countSpan.innerText = parents.length;

            if (parents.length === 0) {
                listContainer.innerHTML = `<div class="empty-state"><i class="fa-solid fa-user-slash"></i><p>Aucun parent enregistré.</p></div>`;
                return;
            }

            parents.forEach(p => {
                const initiale = p.nom_complet.charAt(0).toUpperCase();
                const card = `
                    <div class="parent-item">
                        <div class="parent-avatar">${initiale}</div>
                        <div class="parent-info">
                            <h3>${p.nom_complet.toUpperCase()}</h3>
                            <p><i class="fa-solid fa-envelope"></i> ${p.email}</p>
                        </div>
                        <div class="parent-actions">
                            <a href="voir_enfants.html?id_parent=${p.id_parent}">
                                Dossier <i class="fa-solid fa-folder-tree"></i>
                            </a>
                        </div>
                    </div>
                `;
                listContainer.innerHTML += card;
            });

        } catch (err) {
            console.error("Erreur:", err);
            document.getElementById('loader').innerHTML = `<p style="color:red">Erreur lors du chargement.</p>`;
        }
    }

    // 4. Recherche Dynamique
    document.getElementById('parentSearch').addEventListener('input', function() {
        const filter = this.value.toLowerCase();
        const items = document.getElementsByClassName('parent-item');
        
        Array.from(items).forEach(item => {
            const text = item.innerText.toLowerCase();
            item.style.display = text.includes(filter) ? 'flex' : 'none';
        });
    });

    // 5. Déconnexion
    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }

    chargerParents();
</script>

</body>
</html>
