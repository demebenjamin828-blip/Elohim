<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saisie des Notes | ELOHIM STAFF</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #facc15; --emerald: #064e3b; --dark: #020617; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans', sans-serif; }
        body { background: radial-gradient(circle at top right, #065f46, #022c22) fixed; color: white; padding: 20px; min-height: 100vh; }
        .container { max-width: 600px; margin: 40px auto; background: rgba(15, 23, 42, 0.8); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
        .header { text-align: center; margin-bottom: 30px; }
        .header i { font-size: 2.5rem; color: var(--gold); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #94a3b8; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; outline: none; }
        input:focus { border-color: var(--gold); }
        .btn-save { width: 100%; padding: 15px; background: var(--gold); color: #022c22; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { transform: scale(1.02); }
        .alert { padding: 15px; border-radius: 10px; margin-bottom: 20px; display: none; text-align: center; }
        .success { background: rgba(74, 222, 128, 0.2); color: #4ade80; border: 1px solid #4ade80; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <i class="fa-solid fa-pen-to-square"></i>
        <h2>Saisie des Notes</h2>
        <p>Enregistrez les performances des élèves</p>
    </div>

    <div id="msg" class="alert"></div>

    <form id="noteForm">
        <div class="form-group">
            <label>Sélectionner l'élève</label>
            <select id="id_eleve" required>
                <option value="">Chargement des élèves...</option>
            </select>
        </div>

        <div class="form-group">
            <label>Matière</label>
            <input type="text" id="matiere" placeholder="Ex: Mathématiques" required>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Note / 20</label>
                <input type="number" id="note_valeur" step="0.25" min="0" max="20" placeholder="15.5" required>
            </div>
            <div class="form-group">
                <label>Trimestre</label>
                <select id="trimestre" required>
                    <option value="1">1er Trimestre</option>
                    <option value="2">2ème Trimestre</option>
                    <option value="3">3ème Trimestre</option>
                </select>
            </div>
        </div>

        <button type="submit" id="btn" class="btn-save">PUBLIER LA NOTE</button>
    </form>
</div>

<script>
    const _supabase = supabase.createClient('https://inrcrtyvbgjrrccpzxlk.supabase.co','sb_publishable_tEVOnHljw_fz5UC_cEG9pA_9xglC1VK');

    // 1. Charger la liste des élèves au démarrage
    async function loadEleves() {
        const select = document.getElementById('id_eleve');
        const { data, error } = await _supabase.from('eleves').select('id_eleve, nom_enfant, prenom_enfant');
        
        if (data) {
            select.innerHTML = '<option value="">-- Choisir un élève --</option>';
            data.forEach(e => {
                select.innerHTML += `<option value="${e.id_eleve}">${e.nom_enfant} ${e.prenom_enfant}</option>`;
            });
        }
    }

    // 2. Enregistrer la note
    document.getElementById('noteForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('msg');
        
        const noteData = {
            id_eleve: document.getElementById('id_eleve').value,
            matiere: document.getElementById('matiere').value,
            note_valeur: parseFloat(document.getElementById('note_valeur').value),
            trimestre: parseInt(document.getElementById('trimestre').value),
            date_saisie: new Date().toISOString()
        };

        const { error } = await _supabase.from('notes').insert([noteData]);

        if (!error) {
            msg.innerText = "Note enregistrée avec succès !";
            msg.className = "alert success";
            msg.style.display = "block";
            document.getElementById('noteForm').reset();
        } else {
            alert("Erreur: " + error.message);
        }
    });

    loadEleves();
</script>
</body>
</html>
