<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Administration | ELOHIM APPUI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --gold: #facc15; --emerald: #064e3b; --dark: #020617; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a 40%, #064e3b);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--gold), transparent 70%);
            top: -150px;
            right: -150px;
            opacity: 0.1;
            animation: moveGlow 10s infinite alternate ease-in-out;
        }

        @keyframes moveGlow {
            from { transform: translate(0,0); }
            to { transform: translate(-100px, 100px); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-admin {
            width: 80px;
            height: 80px;
            background: rgba(250, 204, 21, 0.1);
            color: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            border: 1px solid rgba(250, 204, 21, 0.2);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 15px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--gold);
            color: white;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.1);
        }

        .btn-gold {
            background: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 800;
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-gold:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(250, 204, 21, 0.3);
            background: #fde047;
        }

        .footer-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .footer-link:hover { color: var(--gold); }
        
        .alert { font-size: 0.8rem; display: none; margin-bottom: 15px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="icon-admin">
        <i class="fa-solid fa-user-shield"></i>
    </div>
    
    <h2 class="fw-800 mb-1">ADMIN</h2>
    <p class="text-secondary small mb-4">Espace sécurisé ELOHIM APPUI</p>

    <div id="error-msg" class="alert alert-danger">Identifiants incorrects</div>

    <form id="loginForm">
        <input type="email" id="user" class="form-control" placeholder="Email professionnel" required>
        <input type="password" id="pass" class="form-control" placeholder="Mot de passe" required>
        
        <button type="submit" id="btnConnect" class="btn btn-gold mt-2">Se connecter</button>
    </form>

    <div class="mt-4 d-flex flex-column gap-2">
        <a href="inscriptin_staff.html" class="footer-link">Créer un compte staff</a>
        <a href="index.html" class="footer-link"><i class="fa-solid fa-arrow-left me-1"></i> Retour à l'accueil</a>
    </div>
</div>

<script>
    const _supabase = supabase.createClient('https://inrcrtyvbgjrrccpzxlk.supabase.co','sb_publishable_tEVOnHljw_fz5UC_cEG9pA_9xglC1VK');

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        const btn = document.getElementById('btnConnect');
        const errorMsg = document.getElementById('error-msg');

        btn.innerText = "Vérification...";
        btn.disabled = true;
        errorMsg.style.display = "none";

        try {
            const { data, error } = await _supabase
                .from('staff')
                .select('*')
                .eq('email', email)
                .eq('mot_de_passe', pass)
                .single();

            if (error || !data) {
                throw new Error("Identifiants incorrects");
            }

            localStorage.setItem('staff_nom', data.nom_complet);
            window.location.href = "espace_staff.html";

        } catch (err) {
            errorMsg.style.display = "block";
            btn.innerText = "Se connecter";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
