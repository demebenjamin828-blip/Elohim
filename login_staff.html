<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion Staff | ELOHIM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #020617; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .login-box { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 350px; text-align: center; }
        .btn-gold { background: #facc15; color: #020617; font-weight: bold; width: 100%; margin-top: 20px; }
        input { background: rgba(255,255,255,0.1) !important; border: none !important; color: white !important; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="color:#facc15">ADMIN</h2>
        <p>Connexion sécurisée</p>
        <input type="text" id="user" class="form-control" placeholder="Identifiant">
        <input type="password" id="pass" class="form-control" placeholder="Mot de passe">
        <button onclick="connecter()" class="btn btn-gold">ENTRER</button>
        <br><br>
        <a href="inscriptin_staff.html" style="color: gray; text-decoration: none; font-size: 0.8rem;">Créer un compte staff</a>
    </div>

    <script>
        function connecter() {
            // Pour le test, on redirige directement vers ton dashboard
            window.location.href = "espace_staff.html";
        }
    </script>
</body>
</html>
