<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Administration | ELOHIM APPUI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #facc15; --emerald: #064e3b; --dark: #020617; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a 40%, #064e3b);
            color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; width: 100%; max-width: 400px; text-align: center;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; border-radius: 12px; padding: 12px; margin-bottom: 15px;
        }
        .btn-gold {
            background: var(--gold); color: var(--dark); border: none;
            border-radius: 12px; padding: 14px; font-weight: 800; width: 100%; transition: 0.3s;
        }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(250, 204, 21, 0.3); }
        .toggle-link { color: var(--gold); text-decoration: none; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="mb-4">
        <i class="fa-solid fa-user-shield" style="font-size: 3rem; color: var(--gold);"></i>
    </div>
    
    <h2 class="fw-800 mb-1">CONNEXION</h2>
    <p class="text-secondary small mb-4">Espace sécurisé ELOHIM APPUI</p>

    <form id="loginForm">
        <input type="email" id="email" class="form-control" placeholder="Email professionnel" required>
        <input type="password" id="pass" class="form-control" placeholder="Mot de passe" required>
        <button type="submit" id="btnLog" class="btn-gold">SE CONNECTER</button>
    </form>

    <div class="mt-4">
        <p class="small text-secondary">
            Nouveau membre ? <a href="inscriptin_staff.html" class="toggle-link">Créer un compte</a>
        </p>
        <a href="index.html" class="text-secondary small text-decoration-none">← Retour à l'accueil</a>
    </div>
</div>

<script>
    const _supabase = supabase.createClient('https://inrcrtyvbgjrrccpzxlk.supabase.co','sb_publishable_tEVOnHljw_fz5UC_cEG9pA_9xglC1VK');

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnLog');
        btn.innerText = "Vérification...";
        
        const { data, error } = await _supabase
            .from('staff')
            .select('*')
            .eq('email', document.getElementById('email').value)
            .eq('mot_de_passe', document.getElementById('pass').value)
            .single();

        if (data) {
            localStorage.setItem('staff_nom', data.nom_complet);
            window.location.href = "espace_staff.html";
        } else {
            alert("Identifiants incorrects !");
            btn.innerText = "SE CONNECTER";
        }
    });
</script>
</body>
</html>
