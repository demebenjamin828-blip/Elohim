<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration | ELOHIM APPUI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --gold: #facc15; --emerald: #064e3b; --dark: #020617; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a 40%, #064e3b);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--gold), transparent 70%);
            top: -150px;
            right: -150px; opacity: 0.1;
            animation: moveGlow 10s infinite alternate ease-in-out;
        }

        @keyframes moveGlow { from { transform: translate(0,0); } to { transform: translate(-100px, 100px); } }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            text-align: center;
        }

        /* Style des boutons de choix */
        .choice-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            text-align: left;
            color: white;
        }

        .choice-btn:hover {
            border-color: var(--gold);
            background: rgba(250, 204, 21, 0.1);
            transform: scale(1.02);
        }

        .choice-btn i { font-size: 1.5rem; color: var(--gold); }

        /* Le formulaire reste caché au début */
        #loginSection { display: none; animation: fadeIn 0.5s; }

        .form-control {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; border-radius: 12px; padding: 12px; margin-bottom: 15px;
        }

        .btn-gold {
            background: var(--gold); color: var(--dark); border: none;
            border-radius: 12px; padding: 14px; font-weight: 800; width: 100%;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .alert { font-size: 0.8rem; display: none; margin-bottom: 15px; border-radius: 10px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="login-card">
    <h2 class="fw-800 mb-1">ESPACE <span style="color:var(--gold)">STAFF</span></h2>
    <p class="text-secondary small mb-4">Gestion de l'établissement ELOHIM APPUI</p>

    <div id="choiceSection">
        <button class="choice-btn" onclick="showLogin()">
            <i class="fa-solid fa-right-to-bracket"></i>
            <div>
                <div class="fw-bold">Se connecter</div>
                <div class="small text-secondary">Accéder à mon tableau de bord</div>
            </div>
        </button>

        <a href="inscriptin_staff.html" style="text-decoration: none;">
            <button class="choice-btn">
                <i class="fa-solid fa-user-plus"></i>
                <div>
                    <div class="fw-bold">Créer un compte</div>
                    <div class="small text-secondary">Nouveau membre de l'équipe</div>
                </div>
            </button>
        </a>
        
        <a href="index.html" class="text-secondary small text-decoration-none mt-3 d-block">
            <i class="fa-solid fa-arrow-left"></i> Retour à l'accueil
        </a>
    </div>

    <div id="loginSection">
        <div id="error-msg" class="alert alert-danger">Identifiants incorrects</div>
        
        <form id="loginForm">
            <input type="email" id="user" class="form-control" placeholder="Email professionnel" required>
            <input type="password" id="pass" class="form-control" placeholder="Mot de passe" required>
            <button type="submit" id="btnConnect" class="btn-gold">Entrer dans l'espace</button>
        </form>
        
        <button class="btn btn-link text-secondary btn-sm mt-3" onclick="showChoices()">
            <i class="fa-solid fa-chevron-left"></i> Retour aux options
        </button>
    </div>
</div>

<script>
    // Navigation interne
    function showLogin() {
        document.getElementById('choiceSection').style.display = 'none';
        document.getElementById('loginSection').style.display = 'block';
    }
    function showChoices() {
        document.getElementById('choiceSection').style.display = 'block';
        document.getElementById('loginSection').style.display = 'none';
    }

    // Ton script Supabase gardé tel quel
    const _supabase = supabase.createClient('https://inrcrtyvbgjrrccpzxlk.supabase.co','sb_publishable_tEVOnHljw_fz5UC_cEG9pA_9xglC1VK');

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        const btn = document.getElementById('btnConnect');
        const errorMsg = document.getElementById('error-msg');

        btn.innerText = "Vérification...";
        btn.disabled = true;
        errorMsg.style.display = "none";

        try {
            const { data, error } = await _supabase
                .from('staff')
                .select('*')
                .eq('email', email)
                .eq('mot_de_passe', pass)
                .single();

            if (error || !data) throw new Error("Erreur");

            localStorage.setItem('staff_nom', data.nom_complet);
            window.location.href = "espace_staff.html";

        } catch (err) {
            errorMsg.style.display = "block";
            btn.innerText = "Entrer dans l'espace";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
