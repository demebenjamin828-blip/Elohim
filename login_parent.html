<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Parent | ELOHIM APPUI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --gold: #facc15; --emerald: #064e3b; --dark: #020617; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a 40%, #064e3b);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            padding: 12px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--gold);
            color: white;
            box-shadow: none;
        }

        .btn-login {
            background: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 800;
            width: 100%;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(250, 204, 21, 0.3);
            background: #fde047;
        }

        .back-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link:hover { color: var(--gold); }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <i class="fa-solid fa-people-roof mb-3" style="font-size: 3rem; color: var(--gold);"></i>
        <h2 class="fw-bold">Espace Parent</h2>
        <p class="text-secondary">Identifiez-vous pour voir les notes</p>
    </div>

    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label small">Adresse Email</label>
            <input type="email" id="email" class="form-control" placeholder="nom@exemple.com" required>
        </div>
        <div class="mb-4">
            <label class="form-label small">Mot de passe</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login mb-3">SE CONNECTER</button>
    </form>

    <div class="text-center">
        <p class="small text-secondary">Pas encore de compte ? <a href="inscription.html" style="color: var(--gold); text-decoration: none;">S'inscrire</a></p>
        <hr class="border-secondary opacity-25">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left me-2"></i>Retour à l'accueil</a>
    </div>
</div>

<script>
    // Configuration Supabase
    const _supabase = supabase.createClient('https://inrcrtyvbgjrrccpzxlk.supabase.co','sb_publishable_tEVOnHljw_fz5UC_cEG9pA_9xglC1VK');

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // On cherche le parent dans la table 'parents'
        const { data, error } = await _supabase
            .from('parents')
            .select('*')
            .eq('email', email)
            .eq('mot_de_passe', password)
            .single();

        if (data) {
            // Connexion réussie : On stocke les infos et on redirige
            localStorage.setItem('parent_id', data.id_parent);
            localStorage.setItem('parent_nom', data.nom_complet);
            window.location.href = "espace_parent.html";
        } else {
            alert("Identifiants incorrects. Veuillez réessayer.");
        }
    });
</script>

</body>
</html>
