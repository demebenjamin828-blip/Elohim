<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELOHIM APPUI | Excellence Digitale</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root{
--gold:#facc15;
--emerald:#064e3b;
--dark:#020617;
}

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:linear-gradient(135deg,#020617,#0f172a 40%,#064e3b);
color:white;
min-height:100vh;
overflow:hidden;
position:relative;
}

/* Animated Glow Background */
body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,var(--gold),transparent 70%);
top:-200px;
left:-200px;
opacity:0.15;
animation:moveGlow 12s infinite alternate ease-in-out;
}

@keyframes moveGlow{
from{transform:translate(0,0);}
to{transform:translate(200px,150px);}
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero-title{
font-size:clamp(2rem,5vw,4rem);
font-weight:800;
letter-spacing:-2px;
}

.hero-title span{
background:linear-gradient(90deg,var(--gold),white);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* Cards */
.portal-card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:30px;
padding:50px 30px;
border:1px solid rgba(255,255,255,0.1);
transition:0.5s;
position:relative;
overflow:hidden;
color:white;
text-decoration:none;
}

.portal-card::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(120deg,transparent,rgba(250,204,21,0.2),transparent);
transform:translateX(-100%);
transition:0.8s;
}

.portal-card:hover::before{
transform:translateX(100%);
}

.portal-card:hover{
transform:translateY(-15px) scale(1.03);
box-shadow:0 25px 60px rgba(250,204,21,0.3);
border-color:var(--gold);
}

.icon-circle{
width:100px;
height:100px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 25px;
font-size:2.5rem;
background:rgba(250,204,21,0.1);
color:var(--gold);
transition:0.4s;
}

.portal-card:hover .icon-circle{
background:var(--gold);
color:var(--emerald);
transform:rotateY(180deg);
}

.badge-premium{
background:var(--gold);
color:var(--emerald);
padding:6px 15px;
border-radius:20px;
font-size:0.8rem;
font-weight:600;
margin-bottom:15px;
display:inline-block;
}

/* Footer */
footer{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
color:#94a3b8;
font-size:0.9rem;
}
</style>
</head>
<body>

<section class="hero">
<div class="container">

<div class="badge-premium">PORTAIL OFFICIEL 2026</div>

<h1 class="hero-title mb-3">
ELOHIM <span>APPUI</span>
</h1>

<p class="lead text-secondary mb-5">
Plateforme numérique d'excellence académique
</p>

<div class="row justify-content-center g-4">

<div class="col-md-5 col-lg-4">
<a href="login_parent.html" class="portal-card d-block">
<div class="icon-circle">
<i class="fa-solid fa-people-roof"></i>
</div>
<h3 class="fw-bold">Espace Parent</h3>
<p class="text-secondary small">
Suivi académique, résultats et bulletins en temps réel.
</p>
</a>
</div>

<div class="col-md-5 col-lg-4">
<a href="login_staff.html" class="portal-card d-block">
<div class="icon-circle">
<i class="fa-solid fa-user-shield"></i>
</div>
<h3 class="fw-bold">Espace Administration</h3>
<p class="text-secondary small">
Gestion complète des élèves et du personnel.
</p>
</a>
</div>

</div>

</div>
</section>

<footer>
© 2026 ELOHIM APPUI — Discipline • Travail • Succès
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
