<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELOHIM APPUI | Portail d'Excellence</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-emerald: #064e3b;
            --gold: #facc15;
            --dark-bg: #020617;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            background-image: radial-gradient(circle at 20% 30%, rgba(6, 78, 59, 0.4) 0%, transparent 50%);
        }

        .hero-title {
            font-weight: 800;
            font-size: calc(1.5rem + 3vw);
            letter-spacing: -2px;
        }

        .hero-title span {
            color: var(--gold);
        }

        .portal-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            transition: all 0.3s ease-in-out;
            cursor: pointer;
            text-decoration: none;
            color: white;
            backdrop-filter: blur(10px);
        }

        .portal-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--gold);
            color: white;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(250, 204, 21, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--gold);
            margin: 0 auto 20px;
            transition: 0.3s;
        }

        .portal-card:hover .icon-circle {
            background: var(--gold);
            color: var(--primary-emerald);
        }

        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #475569;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center text-center mb-5">
            <div class="col-lg-8">
                <h1 class="hero-title mb-3">ELOHIM <span>APPUI</span></h1>
                <p class="lead text-secondary">L'excellence académique à travers le suivi numérique.</p>
            </div>
        </div>

        <div class="row justify-content-center g-4">
            <div class="col-md-5 col-lg-4">
                <a href="login_parent.html" class="portal-card p-5 d-block text-center">
                    <div class="icon-circle">
                        <i class="fa-solid fa-family"></i>
                    </div>
                    <h3 class="fw-bold h4">Espace Parent</h3>
                    <p class="text-secondary small mb-0">Consultez les résultats et bulletins de vos enfants.</p>
                </a>
            </div>

            <div class="col-md-5 col-lg-4">
                <a href="login_staff.html" class="portal-card p-5 d-block text-center">
                    <div class="icon-circle">
                        <i class="fa-solid fa-user-shield"></i>
                    </div>
                    <h3 class="fw-bold h4">Espace Staff</h3>
                    <p class="text-secondary small mb-0">Gestion des notes, élèves et administration.</p>
                </a>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 ELOHIM APPUI &bull; Discipline - Travail - Succès</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
