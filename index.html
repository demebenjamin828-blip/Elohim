<!DOCTYPE html>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root{
    --primary:#0f172a;
    --accent:#0d9488;
    --light:#f8fafc;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--light);
    color:var(--primary);
}

/* NAVBAR */
.navbar{
    background:white;
    box-shadow:0 2px 15px rgba(0,0,0,0.05);
}

.navbar-brand{
    font-weight:800;
    letter-spacing:-1px;
}

.navbar-brand span{
    color:var(--accent);
}

/* HERO */
.hero{
    padding:100px 0 60px;
}

.hero h1{
    font-weight:800;
    font-size:clamp(2rem,4vw,3.5rem);
}

.hero p{
    color:#64748b;
    font-size:1.1rem;
}

/* CARDS */
.portal-card{
    background:white;
    border-radius:20px;
    padding:40px 30px;
    text-align:center;
    transition:0.3s ease;
    border:1px solid #e2e8f0;
    text-decoration:none;
    color:inherit;
    height:100%;
}

.portal-card:hover{
    transform:translateY(-8px);
    box-shadow:0 20px 40px rgba(0,0,0,0.08);
    border-color:var(--accent);
}

.icon-box{
    width:70px;
    height:70px;
    background:rgba(13,148,136,0.1);
    color:var(--accent);
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 20px;
    font-size:1.8rem;
}

/* BUTTON */
.btn-main{
    background:var(--accent);
    color:white;
    border:none;
    padding:10px 25px;
    border-radius:30px;
    font-weight:600;
}

.btn-main:hover{
    background:#0f766e;
}

/* FOOTER */
footer{
    margin-top:80px;
    padding:20px 0;
    text-align:center;
    background:white;
    border-top:1px solid #e2e8f0;
    color:#64748b;
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
<div class="container">
<a class="navbar-brand" href="#">ELOHIM <span>APPUI</span></a>
<a href="#" class="btn btn-main">Contact</a>
</div>
</nav>

<!-- HERO -->
<section class="hero text-center">
<div class="container">
<h1 class="mb-3">Portail Académique Numérique</h1>
<p class="mb-5">Plateforme moderne de suivi scolaire et d'excellence éducative.</p>

<div class="row justify-content-center g-4">

<div class="col-md-5 col-lg-4">
<a href="login_parent.html" class="portal-card">
<div class="icon-box">
<i class="fa-solid fa-users"></i>
</div>
<h5 class="fw-bold">Espace Parent</h5>
<p class="text-muted small">Accédez aux résultats et bulletins scolaires.</p>
</a>
</div>

<div class="col-md-5 col-lg-4">
<a href="login_staff.html" class="portal-card">
<div class="icon-box">
<i class="fa-solid fa-user-shield"></i>
</div>
<h5 class="fw-bold">Espace Administration</h5>
<p class="text-muted small">Gestion académique et administrative.</p>
</a>
</div>

</div>
</div>
</section>

<footer>

</footer>
