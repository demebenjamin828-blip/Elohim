<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELOHIM APPUI | Accueil</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #064e3b; 
            --gold: #facc15; 
            --bg: #f8fafc;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg);
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 800px;
        }

        .logo-area {
            margin-bottom: 40px;
        }

        .logo-area h1 {
            font-size: 3rem;
            color: var(--primary);
            font-weight: 800;
            text-transform: uppercase;
        }

        .logo-area h1 span {
            color: #d97706; /* Un orange-doré plus chaud */
        }

        .subtitle {
            font-size: 1.1rem;
            color: #64748b;
            margin-top: 10px;
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 50px;
        }

        .choice-btn {
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--primary);
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .choice-btn i {
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .choice-btn h3 {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .choice-btn p {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-top: 10px;
        }

        /* Effet au survol */
        .choice-btn:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            background: #f0fdf4; /* Un vert très très léger */
        }

        .footer {
            margin-top: 60px;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        @media (max-width: 600px) {
            .grid-buttons { grid-template-columns: 1fr; }
            .logo-area h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">
            <h1>ELOHIM <span>APPUI</span></h1>
            <p class="subtitle">Plateforme Scolaire & Suivi des Notes</p>
        </div>

        <div class="grid-buttons">
            <a href="login_parent.html" class="choice-btn">
                <i class="fa-solid fa-user-graduate"></i>
                <h3>Espace Parent</h3>
                <p>Pour suivre les résultats de vos enfants</p>
            </a>

            <a href="login_staff.html" class="choice-btn">
                <i class="fa-solid fa-chalkboard-user"></i>
                <h3>Espace Staff</h3>
                <p>Pour la gestion des notes et de l'école</p>
            </a>
        </div>

        <div class="footer">
            © 2026 ELOHIM APPUI - Excellence et Rigueur
        </div>
    </div>

</body>
</html>
