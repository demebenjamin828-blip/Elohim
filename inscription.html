<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Famille | ELOHIM APPUI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --gold: #facc15; --emerald: #064e3b; --dark: #020617; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a 40%, #064e3b);
            color: white;
            min-height: 100vh;
            padding: 40px 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .section-title {
            color: var(--gold);
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 30px 0 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            padding: 12px;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--gold);
            color: white;
            box-shadow: none;
        }

        .enfant-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 18px;
            border-left: 4px solid var(--gold);
            margin-bottom: 15px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-add {
            background: rgba(250, 204, 21, 0.05);
            border: 2px dashed rgba(250, 204, 21, 0.3);
            color: var(--gold);
            transition: 0.3s;
        }

        .btn-add:hover { background: rgba(250, 204, 21, 0.15); border-color: var(--gold); }

        .btn-register {
            background: var(--gold);
            color: var(--dark);
            font-weight: 800;
            padding: 15px;
            border-radius: 15px;
            border: none;
            transition: 0.3s;
        }

        .btn-register:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(250, 204, 21, 0.3); }

        option { background: #0f172a; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="glass-card">
                <div class="text-center mb-4">
                    <h2 class="fw-800">ELOHIM <span style="color:var(--gold)">APPUI</span></h2>
                    <p class="text-secondary">Inscription de la Famille et des Élèves</p>
                </div>

                <div id="msgBox" class="alert d-none"></div>

                <form id="regForm">
                    <div class="section-title"><i class="fa-solid fa-user-shield"></i> Responsable de la Famille</div>
                    <div class="row g-3">
                        <div class="col-md-6"><input type="text" id="nom_parent" class="form-control" placeholder="Nom" required></div>
                        <div class="col-md-6"><input type="text" id="prenom_parent" class="form-control" placeholder="Prénom" required></div>
                        <div class="col-md-6"><input type="email" id="email" class="form-control" placeholder="Email" required></div>
                        <div class="col-md-6"><input type="tel" id="tel_parent" class="form-control" placeholder="Téléphone" required></div>
                        <div class="col-md-6"><input type="password" id="password" class="form-control" placeholder="Mot de passe" required></div>
                        <div class="col-md-6"><input type="password" id="password_confirm" class="form-control" placeholder="Confirmer" required></div>
                    </div>

                    <div class="section-title"><i class="fa-solid fa-graduation-cap"></i> Enfants à inscrire</div>
                    <div id="enfants-list">
                        <div class="enfant-box">
                            <div class="row g-2">
                                <div class="col-md-6"><input type="text" class="form-control enf-nom" placeholder="Nom Enfant" required></div>
                                <div class="col-md-6"><input type="text" class="form-control enf-prenom" placeholder="Prénom Enfant" required></div>
                                <div class="col-12">
                                    <select class="form-select enf-classe" required>
                                        <option value="" disabled selected>-- Choisir la classe --</option>
                                        <option value="6eme">6ème</option><option value="5eme">5ème</option><option value="4eme">4ème</option><option value="3eme">3ème</option>
                                        <option value="2nde">2nde</option><option value="1ere">1ère</option><option value="Tle">Terminale</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button type="button" class="btn btn-add w-100 mb-4" onclick="ajouterEnfant()">
                        <i class="fa-solid fa-plus-circle me-2"></i> Ajouter un autre enfant
                    </button>

                    <button type="submit" id="submitBtn" class="btn-register w-100">VALIDER L'INSCRIPTION FAMILLE</button>
                    
                    <p class="text-center mt-4 small text-secondary">
                        Déjà inscrit ? <a href="login_parent.html" style="color:var(--gold); text-decoration:none;" class="fw-bold">Se connecter</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const _supabase = supabase.createClient('https://inrcrtyvbgjrrccpzxlk.supabase.co','sb_publishable_tEVOnHljw_fz5UC_cEG9pA_9xglC1VK');

    function ajouterEnfant() {
        const container = document.getElementById('enfants-list');
        const div = document.createElement('div');
        div.className = 'enfant-box';
        div.innerHTML = `
            <div class="row g-2">
                <div class="col-md-6"><input type="text" class="form-control enf-nom" placeholder="Nom Enfant" required></div>
                <div class="col-md-6"><input type="text" class="form-control enf-prenom" placeholder="Prénom Enfant" required></div>
                <div class="col-12 mt-2">
                    <select class="form-select enf-classe" required>
                        <option value="" disabled selected>-- Choisir la classe --</option>
                        <option value="6eme">6ème</option><option value="5eme">5ème</option><option value="4eme">4ème</option><option value="3eme">3ème</option>
                        <option value="2nde">2nde</option><option value="1ere">1ère</option><option value="Tle">Terminale</option>
                    </select>
                </div>
            </div>`;
        container.appendChild(div);
    }

    document.getElementById('regForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const msgBox = document.getElementById('msgBox');
        msgBox.classList.add('d-none');
        
        const pass = document.getElementById('password').value;
        const confirm = document.getElementById('password_confirm').value;

        if(pass !== confirm) {
            msgBox.innerText = "Les mots de passe ne correspondent pas.";
            msgBox.className = "alert alert-danger d-block";
            return;
        }

        btn.disabled = true;
        btn.innerText = "Liaison de la famille en cours...";

        try {
            // 1. CREATION DU PARENT ET RECUPERATION DE L'ID
            const nomComplet = document.getElementById('nom_parent').value.toUpperCase() + " " + document.getElementById('prenom_parent').value;
            
            const { data: pData, error: pErr } = await _supabase
                .from('parents')
                .insert([{ 
                    nom_complet: nomComplet, 
                    email: document.getElementById('email').value, 
                    telephone: document.getElementById('tel_parent').value, 
                    mot_de_passe: pass 
                }])
                .select(); // <--- ICI ON RECUPERE L'ID AUTOMATIQUEMENT

            if (pErr) throw pErr;
            const newParentId = pData[0].id_parent;

            // 2. CREATION DES ENFANTS LIES
            const noms = document.querySelectorAll('.enf-nom');
            const prenoms = document.querySelectorAll('.enf-prenom');
            const classes = document.querySelectorAll('.enf-classe');
            
            let batchEnfants = [];
            noms.forEach((el, i) => {
                batchEnfants.push({
                    id_parent: newParentId, // <--- LIAISON AUTOMATIQUE
                    nom_enfant: el.value.toUpperCase(),
                    prenom_enfant: prenoms[i].value,
                    classe: classes[i].value
                });
            });

            const { error: eErr } = await _supabase.from('eleves').insert(batchEnfants);
            if (eErr) throw eErr;

            msgBox.innerText = "Inscription réussie ! Vos enfants sont liés à votre compte.";
            msgBox.className = "alert alert-success d-block";
            
            setTimeout(() => window.location.href = "login_parent.html", 2000);

        } catch (err) {
            msgBox.innerText = "Erreur : " + err.message;
            msgBox.className = "alert alert-danger d-block";
            btn.disabled = false;
            btn.innerText = "VALIDER L'INSCRIPTION FAMILLE";
        }
    });
</script>
</body>
</html>
