<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin | ELOHIM APPUI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --gold: #facc15; --emerald: #064e3b; --dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #020617, #0f172a 40%, #064e3b); color: white; min-height: 100vh; display:flex; justify-content:center; align-items:center; }
        .card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 2rem; width: 400px; backdrop-filter: blur(10px); }
        h2 { color: var(--gold); }
        .form-control { margin-bottom: 1rem; border-radius: 10px; background: rgba(255,255,255,0.1); border:none; color:white; }
        .form-control:focus { background: rgba(255,255,255,0.15); color:white; box-shadow:none; }
        .btn-primary { width:100%; border-radius:10px; background: var(--gold); border:none; color:#020617; font-weight:600; }
        .btn-primary:hover { background: #e6b800; }
        .link { cursor: pointer; color: #00ffff; text-decoration: underline; display:block; margin-top:1rem; text-align:center; }
    </style>
</head>
<body>
    <div class="card text-center">
        <h2>Portail Administration</h2>
        <p>Connectez-vous pour accéder au dashboard</p>
        <form id="loginForm">
            <input type="text" class="form-control" placeholder="Nom d'utilisateur" required>
            <input type="password" class="form-control" placeholder="Mot de passe" required>
            <button type="submit" class="btn btn-primary">Se connecter</button>
        </form>
        <span class="link" id="createAccount">Créer un compte</span>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', function(e){
            e.preventDefault();
            // Simulation connexion
            alert('Connexion réussie ! Redirection vers le dashboard...');
            window.location.href = 'espace_staff.html'; // ton dashboard actuel
        });

        document.getElementById('createAccount').addEventListener('click', function(){
            alert('Redirection vers création de compte (simulation)');
            // Ici tu pourrais créer une page create_account.html
        });
    </script>
</body>
</html>
