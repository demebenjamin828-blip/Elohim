<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Bord | ELOHIM STAFF</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { --gold: #facc15; --emerald: #064e3b; --dark: #020617; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a 40%, #064e3b);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Effet de lueur en arrière-plan (Miroir) */
        body::before {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--gold), transparent 70%);
            top: -200px;
            left: -200px;
            opacity: 0.1;
            z-index: 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            width: 100%;
            max-width: 1000px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            position: relative;
            z-index: 1;
        }

        .brand h1 {
            font-weight: 800;
            letter-spacing: -1px;
        }

        .brand span { color: var(--gold); }

        .selection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .portal-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 35px;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        .portal-card:hover {
            background: rgba(250, 204, 21, 0.08);
            border-color: var(--gold);
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            color: white;
        }

        .portal-card i {
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(250, 204, 21, 0.3));
        }

        .btn-logout {
            background: transparent;
            border: 1px solid rgba(248, 113, 113, 0.5);
            color: #f87171;
            padding: 12px 30px;
            border-radius: 15px;
            font-weight: 600;
            transition: 0.3s;
            margin-top: 40px;
        }

        .btn-logout:hover {
            background: #f87171;
            color: white;
            box-shadow: 0 0 20px rgba(248, 113, 113, 0.4);
        }
    </style>

    <script>
        // SÉCURITÉ : Redirection si non connecté
        if (!localStorage.getItem('staff_nom')) {
            window.location.href = "login_staff.html";
        }

        function handleLogout() {
            localStorage.removeItem('staff_nom');
            window.location.href = "login_staff.html";
        }
    </script>
</head>
<body class="home-body">

    <div class="glass-card text-center">
        <div class="brand">
            <div class="mb-3">
                <i class="fa-solid fa-chalkboard-user" style="font-size: 3.5rem; color: var(--gold);"></i>
            </div>
            <h1>ESPACE <span>STAFF</span></h1>
            <p class="text-secondary">Bienvenue, <strong id="staffName" style="color: white;">...</strong></p>
        </div>

        <div class="selection-grid">
            <a href="liste_eleves.html" class="portal-card">
                <i class="fa-solid fa-user-graduate"></i>
                <h4 class="fw-bold">Gestion Élèves</h4>
                <p class="small text-secondary mb-0">Inscrire, modifier ou consulter la base de données des élèves.</p>
            </a>

            <a href="saisie_notes.html" class="portal-card">
                <i class="fa-solid fa-pen-to-square"></i>
                <h4 class="fw-bold">Saisie des Notes</h4>
                <p class="small text-secondary mb-0">Enregistrer et mettre à jour les résultats des évaluations.</p>
            </a>

            <a href="bulletins.html" class="portal-card">
                <i class="fa-solid fa-file-invoice-dollar"></i>
                <h4 class="fw-bold">Bulletins</h4>
                <p class="small text-secondary mb-0">Générer les rapports scolaires et imprimer les bulletins.</p>
            </a>
        </div>

        <button onclick="handleLogout()" class="btn btn-logout">
            <i class="fa-solid fa-power-off me-2"></i> DÉCONNEXION
        </button>
    </div>

    <script>
        // Affichage dynamique du nom
        document.getElementById('staffName').innerText = localStorage.getItem('staff_nom') || 'Utilisateur';
    </script>

</body>
</html>
