<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recrutement Staff | ELOHIM APPUI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #facc15; --emerald: #064e3b; --dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #020617, #0f172a 40%, #064e3b); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; width: 100%; max-width: 500px; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
        .form-control, .form-select { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 12px; padding: 12px; }
        .btn-staff { background: var(--gold); color: var(--dark); font-weight: 800; padding: 16px; border-radius: 15px; border: none; width: 100%; transition: 0.3s; }
        .btn-staff:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(250, 204, 21, 0.3); }
    </style>
</head>
<body>
<div class="glass-card text-center">
    <h2 class="fw-800 mb-4" style="color:var(--gold)">CRÉER UN COMPTE STAFF</h2>
    <form id="staffForm">
        <input type="text" id="nom_complet" class="form-control mb-3" placeholder="Nom Complet" required>
        <input type="email" id="email" class="form-control mb-3" placeholder="Email Professionnel" required>
        <select id="role" class="form-select mb-3" required>
            <option value="" disabled selected>Choisir un rôle...</option>
            <option value="professeur">Professeur</option>
            <option value="administrateur">Administrateur</option>
        </select>
        <input type="password" id="password" class="form-control mb-4" placeholder="Mot de passe" required>
        <button type="submit" id="btnSubmit" class="btn-staff">S'INSCRIRE</button>
    </form>
    <a href="login_staff.html" class="d-block mt-3 text-secondary small text-decoration-none">Retour à la connexion</a>
</div>

<script>
    const _supabase = supabase.createClient('https://inrcrtyvbgjrrccpzxlk.supabase.co','sb_publishable_tEVOnHljw_fz5UC_cEG9pA_9xglC1VK');
    document.getElementById('staffForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.innerText = "Enregistrement...";
        
        const { error } = await _supabase.from('staff').insert([{
            nom_complet: document.getElementById('nom_complet').value,
            email: document.getElementById('email').value,
            role: document.getElementById('role').value,
            mot_de_passe: document.getElementById('password').value,
            username: document.getElementById('email').value.split('@')[0]
        }]);

        if (error) { alert("Erreur: " + error.message); btn.innerText = "S'INSCRIRE"; }
        else { alert("Compte créé !"); window.location.href = "login_staff.html"; }
    });
</script>
</body>
</html>
