<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription Administration | ELOHIM APPUI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root{
--gold:#facc15;
--emerald:#064e3b;
--dark:#020617;
}

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:linear-gradient(135deg,#020617,#0f172a 40%,#064e3b);
color:white;
min-height:100vh;
overflow-x:hidden; /* Permet le scroll vertical si le formulaire est long */
position:relative;
}

/* Animated Glow Background (Exactement comme l'index) */
body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,var(--gold),transparent 70%);
top:-200px;
left:-200px;
opacity:0.15;
animation:moveGlow 12s infinite alternate ease-in-out;
z-index: -1;
}

@keyframes moveGlow{
from{transform:translate(0,0);}
to{transform:translate(200px,150px);}
}

/* HERO / CONTAINER */
.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding: 40px 0;
}

/* Le formulaire utilise le style .portal-card pour garder le design */
.inscription-card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:30px;
padding:40px;
border:1px solid rgba(255,255,255,0.1);
transition:0.5s;
position:relative;
width: 100%;
max-width: 700px;
margin: auto;
}

.inscription-card:hover{
box-shadow:0 25px 60px rgba(250,204,21,0.15);
border-color:var(--gold);
}

.hero-title span{
background:linear-gradient(90deg,var(--gold),white);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* Style des champs (Inputs) */
.form-label{
    color: var(--gold);
    font-weight: 600;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.form-control, .form-select{
    background: rgba(255,255,255,0.05) !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
    color: white !important;
    border-radius: 15px;
    padding: 12px 20px;
}

.form-control:focus, .form-select:focus{
    border-color: var(--gold) !important;
    box-shadow: 0 0 15px rgba(250,204,21,0.2) !important;
}

.btn-submit{
    background: var(--gold);
    color: var(--emerald);
    font-weight: 800;
    border-radius: 15px;
    padding: 15px;
    width: 100%;
    border: none;
    transition: 0.4s;
    margin-top: 20px;
    text-transform: uppercase;
}

.btn-submit:hover{
    transform: scale(1.02);
    background: white;
    box-shadow: 0 10px 20px rgba(250,204,21,0.3);
}

.badge-premium{
background:var(--gold);
color:var(--emerald);
padding:6px 15px;
border-radius:20px;
font-size:0.8rem;
font-weight:600;
margin-bottom:15px;
display:inline-block;
}

footer{
text-align:center;
color:#94a3b8;
font-size:0.9rem;
padding: 20px 0;
}

.back-link{
    color: #94a3b8;
    text-decoration: none;
    transition: 0.3s;
}
.back-link:hover{ color: var(--gold); }

</style>
</head>
<body>

<section class="hero">
<div class="container d-flex flex-column align-items-center">

    <div class="badge-premium">ADMINISTRATION PORTAL</div>
    <h1 class="hero-title mb-4 text-center">INSCRIPTION <span>STAFF</span></h1>

    <div class="inscription-card">
        <form id="staffForm" class="row g-3">
            
            <div class="col-md-6">
                <label class="form-label">Nom</label>
                <input type="text" class="form-control" placeholder="Entrez le nom" required>
            </div>
            
            <div class="col-md-6">
                <label class="form-label">Prénom</label>
                <input type="text" class="form-control" placeholder="Entrez le prénom" required>
            </div>

            <div class="col-md-12">
                <label class="form-label">Email Professionnel</label>
                <input type="email" class="form-control" placeholder="nom@elohim.com" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Fonction</label>
                <select class="form-select" required>
                    <option value="" disabled selected>Choisir...</option>
                    <option>Administrateur</option>
                    <option>Professeur</option>
                    <option>Directeur</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">Code École</label>
                <input type="password" class="form-control" placeholder="••••••" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Mot de passe</label>
                <input type="password" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Confirmation</label>
                <input type="password" class="form-control" required>
            </div>

            <div class="col-12 text-center mt-4">
                <button type="submit" class="btn-submit">Créer mon compte staff</button>
                <div class="mt-3">
                    <a href="index.html" class="back-link small">
                        <i class="fa-solid fa-arrow-left"></i> Retour à l'accueil
                    </a>
                </div>
            </div>
        </form>
    </div>

</div>
</section>

<footer>
© 2026 ELOHIM APPUI — Discipline • Travail • Succès
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
