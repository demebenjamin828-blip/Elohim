<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription Staff | ELOHIM</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="glass-card animated-fade-in">
        <div class="throbber-container" id="mainLoader">
            <div class="throbber-line"></div>
        </div>

        <div class="brand">
            <i class="fa-solid fa-user-shield logo-icon"></i>
            <h2>Inscription <span>Administration</span></h2>
        </div>

        <form action="#" method="POST" class="modern-form">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group">
                    <label>Nom</label>
                    <input type="text" name="nom" required>
                </div>
                <div class="input-group">
                    <label>Prenom</label>
                    <input type="text" name="prenom" required>
                </div>
            </div>

            <div class="input-group">
                <label>Email Professionnel</label>
                <input type="email" name="email" required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group">
                    <label>Fonction</label>
                    <select name="role" required>
                        <option value="Administrateur">Administrateur</option>
                        <option value="Professeur">Professeur</option>
                    </select>
                </div>
                <div class="input-group">
                    <label style="color:#facc15">Code Ecole</label>
                    <input type="password" name="code_invitation" required>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group">
                    <label>Mot de passe</label>
                    <input type="password" name="password" required>
                </div>
                <div class="input-group">
                    <label>Confirmation</label>
                    <input type="password" name="password_confirm" required>
                </div>
            </div>

            <button type="submit" class="btn-submit" onclick="showLoader()">CREER MON COMPTE</button>
            
            <div style="text-align: center; margin-top: 15px;">
                <a href="index.html" style="color: white; text-decoration: none; font-size: 0.8em; opacity: 0.7;">
                    <i class="fa-solid fa-arrow-left"></i> Retour à l'accueil
                </a>
            </div>
        </form>
    </div>

    <script>
        function showLoader(){ 
            if(document.querySelector('form').checkValidity()) 
                document.getElementById('mainLoader').classList.add('show-loader'); 
        }
    </script>
</body>
</html>
