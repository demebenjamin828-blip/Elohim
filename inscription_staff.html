<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELOHIM APPUI | Inscription Administration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root{
--gold:#facc15;
--emerald:#064e3b;
--dark:#020617;
}

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:linear-gradient(135deg,#020617,#0f172a 40%,#064e3b);
color:white;
min-height:100vh;
overflow-x:hidden;
position:relative;
}

/* Animated Glow Background (Ton Squelette) */
body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,var(--gold),transparent 70%);
top:-200px;
left:-200px;
opacity:0.15;
animation:moveGlow 12s infinite alternate ease-in-out;
}

@keyframes moveGlow{
from{transform:translate(0,0);}
to{transform:translate(200px,150px);}
}

.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding: 50px 0;
}

.hero-title span{
background:linear-gradient(90deg,var(--gold),white);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* Ta Carte Portal transformée en Formulaire */
.portal-card-form{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:30px;
padding:40px;
border:1px solid rgba(255,255,255,0.1);
transition:0.5s;
position:relative;
overflow:hidden;
color:white;
text-align: left;
max-width: 800px;
margin: 0 auto;
}

.portal-card-form:hover{
border-color:var(--gold);
box-shadow:0 25px 60px rgba(250,204,21,0.2);
}

.icon-circle-small{
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:20px;
font-size:1.5rem;
background:rgba(250,204,21,0.1);
color:var(--gold);
}

/* Style des Inputs pour coller au design */
.form-label { color: var(--gold); font-weight: 600; font-size: 0.8rem; }
.form-control, .form-select {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
    border-radius: 15px;
    padding: 12px;
}
.form-control:focus { background: rgba(255,255,255,0.1); color: white; border-color: var(--gold); box-shadow: none; }

.btn-gold-submit{
    background: var(--gold);
    color: var(--emerald);
    border: none;
    border-radius: 15px;
    padding: 15px;
    font-weight: 800;
    width: 100%;
    margin-top: 20px;
    transition: 0.3s;
}
.btn-gold-submit:hover { transform: translateY(-3px); background: white; }

.badge-premium{
background:var(--gold);
color:var(--emerald);
padding:6px 15px;
border-radius:20px;
font-size:0.8rem;
font-weight:600;
margin-bottom:15px;
display:inline-block;
}

footer{
position:relative;
bottom:20px;
width:100%;
text-align:center;
color:#94a3b8;
font-size:0.9rem;
margin-top: 30px;
}
</style>
</head>
<body>

<section class="hero">
<div class="container">

<div class="badge-premium">ADMINISTRATION 2026</div>

<h1 class="hero-title mb-5">
INSCRIPTION <span>STAFF</span>
</h1>

<div class="portal-card-form">
    <div class="icon-circle-small">
        <i class="fa-solid fa-user-shield"></i>
    </div>
    
    <form class="row g-3">
        <div class="col-md-6">
            <label class="form-label">NOM</label>
            <input type="text" class="form-control" placeholder="Nom" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">PRÉNOM</label>
            <input type="text" class="form-control" placeholder="Prénom" required>
        </div>
        <div class="col-md-12">
            <label class="form-label">EMAIL PROFESSIONNEL</label>
            <input type="email" class="form-control" placeholder="nom@elohim.com" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">FONCTION</label>
            <select class="form-select">
                <option>Administrateur</option>
                <option>Professeur</option>
            </select>
        </div>
        <div class="col-md-6">
            <label class="form-label">CODE ÉCOLE</label>
            <input type="password" class="form-control" placeholder="••••••" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">MOT DE PASSE</label>
            <input type="password" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">CONFIRMATION</label>
            <input type="password" class="form-control" required>
        </div>
        
        <div class="col-12">
            <button type="submit" class="btn-gold-submit">VALIDER L'INSCRIPTION ADMINISTRATION</button>
        </div>
    </form>
    
    <div class="text-center mt-4">
        <a href="index.html" style="color: #94a3b8; text-decoration: none; font-size: 0.8rem;">
            <i class="fa-solid fa-arrow-left"></i> Retour au portail principal
        </a>
    </div>
</div>

</div>
</section>

<footer>
© 2026 ELOHIM APPUI — Discipline • Travail • Succès
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
