<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recrutement Staff | ELOHIM APPUI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --gold: #facc15; --emerald: #064e3b; --dark: #020617; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a 40%, #064e3b);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .header i {
            font-size: 3.5rem;
            color: var(--gold);
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(250, 204, 21, 0.3));
        }

        .form-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold);
            font-weight: 700;
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--gold);
            border-radius: 12px 0 0 12px;
        }

        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 0 12px 12px 0;
            padding: 12px;
        }

        /* Fix pour le select (icône et texte) */
        .form-select {
            border-radius: 0 12px 12px 0;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23facc15' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--gold);
            color: white;
            box-shadow: none;
        }

        .btn-staff {
            background: var(--gold);
            color: var(--dark);
            font-weight: 800;
            padding: 16px;
            border-radius: 15px;
            border: none;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-staff:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(250, 204, 21, 0.3);
            background: #fde047;
        }

        option { background: #0f172a; color: white; }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="text-center header mb-4">
        <i class="fa-solid fa-user-gear"></i>
        <h2 class="fw-800">RECRUTEMENT</h2>
        <p class="text-secondary small">Espace d'inscription pour le personnel</p>
    </div>

    <div id="msg" class="alert d-none mb-4" role="alert"></div>

    <form id="staffForm">
        <div class="mb-3">
            <label class="form-label">Nom Complet</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                <input type="text" id="nom_complet" class="form-control" placeholder="Ex: Jean Dupont" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Email Professionnel</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                <input type="email" id="email" class="form-control" placeholder="staff@elohim.com" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Rôle / Fonction</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fa-solid fa-briefcase"></i></span>
                <select id="role" class="form-select" required>
                    <option value="" disabled selected>Choisir un rôle...</option>
                    <option value="professeur">Professeur</option>
                    <option value="administrateur">Administrateur</option>
                    <option value="coordinateur">Coordinateur</option>
                </select>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Mot de passe</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" id="btnSubmit" class="btn-staff w-100">CRÉER MON COMPTE STAFF</button>

        <p class="text-center mt-4 small text-secondary">
            Déjà membre ? <a href="login_staff.html" style="color:var(--gold); text-decoration:none;" class="fw-bold">Se connecter</a>
        </p>
    </form>
</div>

<script>
    const _supabase = supabase.createClient('https://inrcrtyvbgjrrccpzxlk.supabase.co','sb_publishable_tEVOnHljw_fz5UC_cEG9pA_9xglC1VK');

    document.getElementById('staffForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('msg');
        const btn = document.getElementById('btnSubmit');

        msg.classList.add('d-none');
        btn.disabled = true;
        btn.innerText = "Traitement en cours...";

        const staffData = {
            nom_complet: document.getElementById('nom_complet').value,
            email: document.getElementById('email').value,
            role: document.getElementById('role').value,
            mot_de_passe: document.getElementById('password').value,
            // On ajoute username pour correspondre au login futur
            username: document.getElementById('email').value.split('@')[0] 
        };

        try {
            const { error } = await _supabase.from('staff').insert([staffData]);
            
            if (error) throw error;

            msg.innerText = "Compte créé avec succès !";
            msg.className = "alert alert-success d-block";
            
            setTimeout(() => window.location.href = "login_staff.html", 2000);

        } catch (err) {
            msg.innerText = "Erreur : " + err.message;
            msg.className = "alert alert-danger d-block";
            btn.disabled = false;
            btn.innerText = "CRÉER MON COMPTE STAFF";
        }
    });
</script>

</body>
</html>
