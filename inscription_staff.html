<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Staff | ELOHIM</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">

    <a href="index.html" class="back-home">
        <i class="fa-solid fa-arrow-left"></i> Accueil
    </a>

    <div class="glass-card animated-fade-in">
        <div class="throbber-container" id="mainLoader">
            <div class="throbber-line"></div>
        </div>

        <div class="brand">
            <i class="fa-solid fa-user-shield logo-icon"></i>
            <h2>Inscription <span>Administration</span></h2>
            <p class="subtitle">Portail sécurisé ELOHIM</p>
        </div>

        <form action="#" method="GET" class="modern-form" id="registrationForm">
            
            <div class="form-row-grid">
                <div class="input-group">
                    <label><i class="fa-solid fa-signature"></i> Nom</label>
                    <input type="text" name="nom" placeholder="Ex: TRAORE" required>
                </div>
                <div class="input-group">
                    <label>Prénom</label>
                    <input type="text" name="prenom" placeholder="Ex: Moussa" required>
                </div>
            </div>

            <div class="input-group">
                <label><i class="fa-solid fa-envelope"></i> Email Professionnel</label>
                <input type="email" name="email" placeholder="nom@elohim.com" required>
            </div>

            <div class="form-row-grid">
                <div class="input-group">
                    <label><i class="fa-solid fa-briefcase"></i> Fonction</label>
                    <select name="role" required>
                        <option value="" disabled selected>Choisir...</option>
                        <option value="Administrateur">Administrateur</option>
                        <option value="Professeur">Professeur</option>
                    </select>
                </div>
                <div class="input-group">
                    <label style="color:#facc15"><i class="fa-solid fa-key"></i> Code École</label>
                    <input type="password" name="code_invitation" placeholder="Code requis" required>
                </div>
            </div>

            <div class="form-row-grid">
                <div class="input-group">
                    <label><i class="fa-solid fa-lock"></i> Mot de passe</label>
                    <input type="password" name="password" required>
                </div>
                <div class="input-group">
                    <label>Confirmation</label>
                    <input type="password" name="password_confirm" required>
                </div>
            </div>

            <button type="submit" class="btn-submit" onclick="showLoader()">
                CREER MON COMPTE
            </button>
            
            <div class="form-footer">
                <p>Déjà membre du staff ? <a href="login_staff.html">Se connecter</a></p>
            </div>
        </form>
    </div>

    <script>
        function showLoader(){ 
            const form = document.getElementById('registrationForm');
            if(form.checkValidity()) {
                document.getElementById('mainLoader').classList.add('show-loader'); 
                // Pour GitHub Pages, on simule une redirection après 2 secondes
                setTimeout(() => {
                    alert("Compte simulé avec succès ! (Mode démo GitHub)");
                    window.location.href = "login_staff.html";
                }, 2000);
            }
        }
    </script>
</body>
</html>
